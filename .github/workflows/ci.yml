name: CI

on:
  push:
    branches: [main, develop, 'claude/**']
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with flake8
        run: |
          flake8 core/ services/ routes/ app.py config.py --count --show-source --statistics

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short --cov=core --cov=services --cov=routes --cov-report=term-missing

      - name: Type check core modules
        run: |
          mypy core/action_registry.py core/policy_engine.py core/persistence.py --ignore-missing-imports --no-error-summary || true
